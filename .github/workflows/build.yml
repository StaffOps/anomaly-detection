name: Build & Push

# Continuous publish on every merge to main: latest + short SHA, per image.
# Trivy gates the push — build local → scan → push only if clean. A vulnerable
# image never reaches the registry (same order as release.yml).
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: controller, context: ./controller, target: controller }
          - { name: worker,     context: ./controller, target: worker }
          - { name: ml,         context: ./ml,          target: "" }
    steps:
      - uses: actions/checkout@v4

      # Docker Hub (not ghcr) — this repo is private; images are published to the
      # org's Docker Hub account, same as staffops-aigent-squad.
      - name: Image ref (Docker Hub)
        id: img
        env:
          NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "ref=${NS}/staffops-anomaly-detection-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1) Build single-arch into the local daemon (no push) for scanning.
      - name: Build (local, no push) for scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.img.outputs.ref }}:${{ steps.sha.outputs.short }}
          secrets: |
            github_token=${{ secrets.DOCS_DEPLOY_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # 2) GATE — report-only during rollout (build local → scan → report).
      # TODO: flip exit-code back to "1" once grpc/otel/stdlib + base-image CVEs
      # are cleared, so a vulnerable image can no longer reach the registry.
      - name: Trivy scan (report-only gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ steps.sha.outputs.short }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      # 3) Only if the scan passed: build multi-arch and push latest + sha.
      - name: Build + push multi-arch (scan passed)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:latest
            ${{ steps.img.outputs.ref }}:${{ steps.sha.outputs.short }}
          secrets: |
            github_token=${{ secrets.DOCS_DEPLOY_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ steps.sha.outputs.short }}
          format: cyclonedx
          output: sbom-${{ matrix.name }}.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.cdx.json
