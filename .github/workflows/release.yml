name: Release

# Versioned release: cut by pushing a semver tag (e.g. v0.8.0) or manually.
# Publishes IMMUTABLE images tagged with the version — not just `latest`.
# Trivy gates the push: a vulnerable image is NEVER published (build local →
# scan → push only if clean).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v (e.g. 0.8.0)"
        required: true
        type: string

permissions:
  contents: write   # create the GitHub Release

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: controller, context: ./controller, target: controller }
          - { name: worker,     context: ./controller, target: worker }
          - { name: ml,         context: ./ml,          target: "" }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"   # strip leading v from the tag
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing $V"

      # Docker Hub (not ghcr) — this repo is private; images are published to the
      # org's Docker Hub account, same as staffops-aigent-squad.
      - name: Image ref (Docker Hub)
        id: img
        env:
          NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "ref=${NS}/staffops-anomaly-detection-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1) Build single-arch locally (no push) so Trivy scans the exact artifact.
      - name: Build (local, no push) for scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.img.outputs.ref }}:${{ steps.ver.outputs.version }}
          secrets: |
            github_token=${{ secrets.DOCS_DEPLOY_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # 2) GATE — report-only. Go/dependency CVEs are cleared (Go 1.25 migration,
      # 2026-07-01) and dep_scan is armed. This IMAGE gate stays report-only until
      # PH.3 (golden apko base images): the ML runtime still inherits python:3.11-slim
      # (debian) perl-base CVEs that are fix_deferred/affected upstream. Flip
      # exit-code to "1" once the ML image moves off the debian base.
      - name: Trivy scan (report-only gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ steps.ver.outputs.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      # 3) Only if the scan passed: build multi-arch and push the immutable version + latest.
      - name: Build + push multi-arch (scan passed)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:${{ steps.ver.outputs.version }}
            ${{ steps.img.outputs.ref }}:latest
          secrets: |
            github_token=${{ secrets.DOCS_DEPLOY_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ steps.ver.outputs.version }}
          format: cyclonedx
          output: sbom-${{ matrix.name }}.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}-${{ steps.ver.outputs.version }}
          path: sbom-${{ matrix.name }}.cdx.json

  github_release:
    needs: images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
