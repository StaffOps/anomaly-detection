# Default values for staffops-anomaly-detection.
# Per-environment overrides in values-{dev,hml,prd}.yaml.

global:
  # Environment is a runtime label (LOCAL/DEV/HML/PRD/BTC). Corp cost tags
  # (CostCenter/CostProject/CostScope) are injected at deploy time by the corp
  # overlay/ApplicationSet — this repo stays org-neutral.
  environment: "DEV"

# --- Controller ---
controller:
  image:
    repository: staffops/anomaly-controller
    tag: ""  # Set by CI (SHA or version). NEVER use "latest".
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      # No CPU limit (PH.20 — ScaleOps manages)
      memory: 256Mi
  serviceAccount:
    # IRSA annotation — zero-permission placeholder, scoped policies added later.
    irsaRoleArn: ""  # CONFIRM: provide the actual ARN when created
  leaderElection:
    enabled: true

# --- Worker ---
worker:
  image:
    repository: staffops/anomaly-worker
    tag: ""  # Set by CI
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      # No CPU limit (PH.20)
      memory: 512Mi

# --- Redis ---
redis:
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # empty = cluster default (gp3)
  auth:
    # Password synced by External Secrets Operator from AWS Secrets Manager.
    secretName: anomaly-redis-auth
    # ClusterSecretStore name (verified in the core cluster: `aws`, ReadWrite/Valid).
    secretStore: "aws"
    # AWS Secrets Manager key ESO fetches (create it to homologate — see README).
    awsSecretKey: "staffops/anomaly-detection/redis-password"

# --- ML Service ---
ml:
  enabled: false  # Enable when ML is validated for production
  image:
    repository: staffops/anomaly-ml
    tag: ""  # CONFIRM: ML image repo/tag source (CI pipeline or manual)
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      # No CPU limit
      memory: 1Gi

# --- Config (replaces hardcoded ConfigMap) ---
config:
  cluster: "unknown"  # Overridden per-env

  # Datasource URLs — no longer hardcoded in ConfigMap (PH.14)
  datasources:
    victoriametrics:
      url: "http://vm-cluster-vmselect.monitoring:8481/select/0/prometheus"
      timeout: "30s"
    loki:
      url: "http://loki-gateway.monitoring:80"
      timeout: "30s"
    alertmanager:
      url: "http://prometheus-alertmanager.monitoring:9093"

  ml:
    endpoint: "anomaly-ml.monitoring:50051"
    enabled: false
    timeout: "5s"

  controller:
    jobInterval: "60s"
    correlationWindow: "2m"
    cooldown: "5m"
    fdrTarget: 0.05
    leaseName: "anomaly-controller-leader"
    workerEndpoint: "dns:///anomaly-worker.monitoring:50052"

  worker:
    grpcPort: 50052
    metricsPort: 8081
    concurrency: 2

  baseline:
    windowSize: 60
    ewmaAlpha: 0.3
    zscoreThreshold: 3.0
    poisonThreshold: 4.0
    warmUpSamples: 60
    seasonalMinDays: 7

  suppression:
    excludeNamespacesCsv: "kube-system"
    excludeStaticOnlyCsv: ""

  enrichment:
    enabled: true
    cacheTtl: "30s"
    queryTimeout: "5s"
    maxConcurrent: 2

  links:
    grafanaBaseUrl: ""
    tempoBaseUrl: ""
    lokiBaseUrl: ""
    runbookBaseUrl: ""
    grafanaVmDatasourceUid: ""
    grafanaTempoDatasourceUid: ""
    grafanaLokiDatasourceUid: ""

# --- Network Policies (PH.21) ---
networkPolicy:
  enabled: true

# --- VMServiceScrape (replaces prometheus.io/scrape annotations) ---
vmServiceScrape:
  enabled: true

# --- VMRules ---
vmRules:
  enabled: true
