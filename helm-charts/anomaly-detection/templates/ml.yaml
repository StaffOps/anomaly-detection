{{- if .Values.ml.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: anomaly-ml
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-ml
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: anomaly-ml
  ports:
    - port: 50051
      name: grpc
      targetPort: grpc
    - port: 8082
      name: metrics
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-ml
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-ml
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.ml.replicas }}
  selector:
    matchLabels:
      app: anomaly-ml
  template:
    metadata:
      labels:
        app: anomaly-ml
        app.kubernetes.io/name: anomaly-ml
        app.kubernetes.io/version: {{ .Values.ml.image.tag | default .Chart.AppVersion | quote }}
        CostCenter: {{ .Values.global.costCenter | quote }}
        Environment: {{ .Values.global.environment | quote }}
    spec:
      securityContext:
        {{- include "anomaly-detection.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: ml
          image: "{{ .Values.ml.image.repository }}:{{ .Values.ml.image.tag | default .Chart.AppVersion }}"
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8082
              name: metrics
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: METRICS_PORT
              value: "8082"
          securityContext:
            {{- include "anomaly-detection.securityContext" . | nindent 12 }}
          {{- include "anomaly-detection.lifecycle" . | nindent 10 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /app/models
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              {{- toYaml .Values.ml.resources.requests | nindent 14 }}
            limits:
              memory: {{ .Values.ml.resources.limits.memory }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          emptyDir: {}
{{- end }}
