apiVersion: v1
kind: ServiceAccount
metadata:
  name: anomaly-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
# PH.23: Worker no longer has events list/watch — only controller uses EventWatcher.
# No Role/RoleBinding needed for worker.
apiVersion: v1
kind: Service
metadata:
  name: anomaly-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-worker
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  selector:
    app: anomaly-worker
  ports:
    - port: 50052
      name: grpc
      targetPort: grpc
    - port: 8081
      name: metrics
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-worker
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: anomaly-worker
  template:
    metadata:
      labels:
        app: anomaly-worker
        app.kubernetes.io/name: anomaly-worker
        app.kubernetes.io/version: {{ .Values.worker.image.tag | default .Chart.AppVersion | quote }}
        Environment: {{ .Values.global.environment | quote }}
    spec:
      serviceAccountName: anomaly-worker
      securityContext:
        {{- include "anomaly-detection.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          args: ["--config", "/config/config.yaml"]
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 8081
              name: metrics
          env:
            - name: CLUSTER_NAME
              value: {{ .Values.config.cluster | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.auth.secretName }}
                  key: redis-password
          securityContext:
            {{- include "anomaly-detection.securityContext" . | nindent 12 }}
          {{- include "anomaly-detection.lifecycle" . | nindent 10 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: redis-secret
              mountPath: /etc/secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              {{- toYaml .Values.worker.resources.requests | nindent 14 }}
            limits:
              memory: {{ .Values.worker.resources.limits.memory }}
      volumes:
        - name: config
          configMap:
            name: anomaly-detection-config
        - name: tmp
          emptyDir: {}
        - name: redis-secret
          secret:
            secretName: {{ .Values.redis.auth.secretName }}
            defaultMode: 0400
