{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anomaly-redis-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.redis.persistence.storageClass }}
  storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-redis
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-redis
  template:
    metadata:
      labels:
        app: anomaly-redis
        app.kubernetes.io/name: anomaly-redis
        app.kubernetes.io/version: {{ .Values.redis.image.tag | quote }}
        CostCenter: {{ .Values.global.costCenter | quote }}
        Environment: {{ .Values.global.environment | quote }}
    spec:
      securityContext:
        {{- include "anomaly-detection.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          args:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --dir
            - /data
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.auth.secretName }}
                  key: redis-password
          ports:
            - containerPort: 6379
              name: redis
          securityContext:
            {{- include "anomaly-detection.securityContext" . | nindent 12 }}
          {{- include "anomaly-detection.lifecycle" . | nindent 10 }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep -q PONG
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep -q PONG
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- if .Values.redis.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: anomaly-redis-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-redis
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: anomaly-redis
  ports:
    - port: 6379
      name: redis
      targetPort: redis
