# Controller Service (metrics only — no external traffic).
# Required for VMServiceScrape to discover endpoints.
apiVersion: v1
kind: Service
metadata:
  name: anomaly-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: anomaly-controller
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: anomaly-controller
  ports:
    - port: 8080
      name: metrics
      targetPort: metrics
