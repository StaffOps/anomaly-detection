apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anomaly-redis-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.redis.auth.secretStore | default "aws" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.redis.auth.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: {{ .Values.redis.auth.awsSecretKey }}
