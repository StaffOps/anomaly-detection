apiVersion: v1
kind: ConfigMap
metadata:
  name: anomaly-detection-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anomaly-detection.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  config.yaml: |
    cluster: {{ .Values.config.cluster | quote }}

    redis:
      addr: anomaly-redis.{{ .Release.Namespace }}:6379
      db: 0
      # Go config uses `password` with ${VAR} expansion (internal/config expandEnv).
      # REDIS_PASSWORD is injected into controller/worker via secretKeyRef (ESO-backed).
      password: ${REDIS_PASSWORD}

    datasources:
      victoriametrics:
        url: {{ .Values.config.datasources.victoriametrics.url | quote }}
        timeout: {{ .Values.config.datasources.victoriametrics.timeout | default "30s" | quote }}
      loki:
        url: {{ .Values.config.datasources.loki.url | quote }}
        timeout: {{ .Values.config.datasources.loki.timeout | default "30s" | quote }}
      alertmanager:
        url: {{ .Values.config.datasources.alertmanager.url | quote }}

    ml:
      endpoint: anomaly-ml.{{ .Release.Namespace }}:50051
      enabled: {{ .Values.config.ml.enabled }}
      timeout: {{ .Values.config.ml.timeout | default "5s" | quote }}

    controller:
      job_interval: {{ .Values.config.controller.jobInterval | default "60s" | quote }}
      correlation_window: {{ .Values.config.controller.correlationWindow | default "2m" | quote }}
      cooldown: {{ .Values.config.controller.cooldown | default "5m" | quote }}
      fdr_target: {{ .Values.config.controller.fdrTarget | default 0.05 }}
      lease_name: {{ .Values.config.controller.leaseName | default "anomaly-controller-leader" | quote }}
      lease_namespace: {{ .Release.Namespace }}
      metrics_port: 8080
      worker_endpoint: {{ .Values.config.controller.workerEndpoint | default (printf "dns:///anomaly-worker.%s:50052" .Release.Namespace) | quote }}
      leader_election:
        enabled: {{ .Values.controller.leaderElection.enabled }}
        identity: ""
        lease_duration: 15s
        renew_deadline: 10s
        retry_period: 2s

    worker:
      grpc_port: {{ .Values.config.worker.grpcPort | default 50052 }}
      metrics_port: {{ .Values.config.worker.metricsPort | default 8081 }}
      concurrency: {{ .Values.config.worker.concurrency | default 2 }}

    baseline:
      window_size: {{ .Values.config.baseline.windowSize | default 60 }}
      ewma_alpha: {{ .Values.config.baseline.ewmaAlpha | default 0.3 }}
      zscore_threshold: {{ .Values.config.baseline.zscoreThreshold | default 3.0 }}
      poison_threshold: {{ .Values.config.baseline.poisonThreshold | default 4.0 }}
      warm_up_samples: {{ .Values.config.baseline.warmUpSamples | default 60 }}
      seasonal_min_days: {{ .Values.config.baseline.seasonalMinDays | default 7 }}

    detection:
      static_rules:
        - name: high_restart_rate
          query: 'max(increase(kube_pod_container_status_restarts_total{namespace!~"kube-system"}[5m])) by (namespace, pod)'
          threshold: 3
          operator: ">"
          severity: critical
        - name: istio_5xx_rate_high
          query: 'sum(rate(istio_requests_total{response_code=~"5..",destination_workload!=""}[5m])) by (destination_workload, destination_workload_namespace) / sum(rate(istio_requests_total{destination_workload!=""}[5m])) by (destination_workload, destination_workload_namespace) > 0.05'
          threshold: 0.05
          operator: ">"
          severity: warning
        - name: kestrel_queued_requests_high
          query: 'max(kestrel_queued_requests) by (namespace, pod)'
          threshold: 50
          operator: ">"
          severity: warning
        - name: dotnet_threadpool_saturated
          query: 'max(dotnet_thread_pool_queue_length_total) by (namespace, pod) > 0 or max(process_runtime_dotnet_thread_pool_queue_length) by (namespace, pod) > 0'
          threshold: 100
          operator: ">"
          severity: warning
        - name: http_client_queue_time_high
          query: 'histogram_quantile(0.99, sum(rate(http_client_request_time_in_queue_seconds_bucket[5m])) by (le, namespace, pod))'
          threshold: 2.0
          operator: ">"
          severity: warning
        - name: otel_collector_dropping_spans
          query: 'sum(rate(otelcol_exporter_enqueue_failed_spans_total[5m])) by (service_name)'
          threshold: 0
          operator: ">"
          severity: critical
        - name: rollout_stuck
          query: 'max(rollout_info_replicas_unavailable) by (namespace, rollout)'
          threshold: 0
          operator: ">"
          severity: warning

      adaptive_metrics:
        - name: error_rate_by_service
          query: 'sum(rate(spanmetrics_apm_calls_total{status_code="STATUS_CODE_ERROR"}[1m])) by (service_name)'
          group_by: [service_name]
        - name: request_rate_by_service
          query: 'sum(rate(spanmetrics_apm_calls_total[1m])) by (service_name)'
          group_by: [service_name]
        - name: latency_p99_by_service
          query: 'histogram_quantile(0.99, sum(rate(spanmetrics_apm_duration_milliseconds_bucket[5m])) by (le, service_name))'
          group_by: [service_name]
        - name: istio_error_rate_by_workload
          query: 'sum(rate(istio_requests_total{response_code=~"5..",destination_workload!=""}[1m])) by (destination_workload, destination_workload_namespace)'
          group_by: [destination_workload, destination_workload_namespace]
        - name: dotnet_gc_pause_rate
          query: 'sum(rate(dotnet_gc_pause_time_seconds_total[1m])) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: dotnet_heap_growth
          query: 'max(process_runtime_dotnet_gc_heap_size_bytes) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: http_client_active_requests
          query: 'max(http_client_active_requests) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: queue_depth
          query: 'max(queue_depth_messages) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: queue_failed_rate
          query: 'sum(rate(queue_messages_failed_total[1m])) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: hikari_pool_pending
          query: 'max(hikaricp_connections_pending) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: go_sql_waiting
          query: 'max(go_sql_stats_connections_waited_for_total) by (namespace, pod)'
          group_by: [namespace, pod]
        - name: otel_collector_queue_size
          query: 'max(otelcol_exporter_queue_size) by (service_name)'
          group_by: [service_name]
        - name: karpenter_scheduling_duration
          query: 'histogram_quantile(0.99, sum(rate(karpenter_provisioner_scheduling_duration_seconds_bucket[5m])) by (le))'
          group_by: []

      log_patterns:
        - name: error_rate_by_namespace
          query: 'sum(rate({service_namespace=~".+"} |= "error" [1m])) by (service_namespace)'
          group_by: [service_namespace]
        - name: log_volume_by_workload
          query: 'sum(rate({service_namespace=~".+"}[1m])) by (service_namespace, service_workload)'
          group_by: [service_namespace, service_workload]
        - name: panic_oom
          query: '{service_namespace=~".+"} |~ "(?i)(panic|oom|out of memory|fatal)"'
          type: pattern_match

      event_patterns:
        - CrashLoopBackOff
        - OOMKilled
        - Evicted
        - FailedScheduling
        - BackOff

    suppression:
      exclude_namespaces_csv: {{ .Values.config.suppression.excludeNamespacesCsv | default "kube-system" | quote }}
      exclude_static_only_csv: {{ .Values.config.suppression.excludeStaticOnlyCsv | default "" | quote }}

    enrichment:
      enabled: {{ .Values.config.enrichment.enabled | default true }}
      cache_ttl: {{ .Values.config.enrichment.cacheTtl | default "30s" | quote }}
      query_timeout: {{ .Values.config.enrichment.queryTimeout | default "5s" | quote }}
      max_concurrent: {{ .Values.config.enrichment.maxConcurrent | default 2 }}
      pod_bundle:
        - name: cpu_ratio
          query: 'max(rate(container_cpu_usage_seconds_total{namespace="$namespace",pod="$pod",container!=""}[1m])) / max(kube_pod_container_resource_limits{resource="cpu",namespace="$namespace",pod="$pod"})'
        - name: memory_ratio
          query: 'max(container_memory_working_set_bytes{namespace="$namespace",pod="$pod",container!=""}) / max(kube_pod_container_resource_limits{resource="memory",namespace="$namespace",pod="$pod"})'
        - name: restarts_5m
          query: 'max(increase(kube_pod_container_status_restarts_total{namespace="$namespace",pod="$pod"}[5m]))'
        - name: oom_kills
          query: 'max(kube_pod_container_status_terminated_reason{namespace="$namespace",pod="$pod",reason="OOMKilled"})'
        - name: ready_replicas
          query: 'max(kube_pod_status_ready{namespace="$namespace",pod="$pod",condition="true"})'
        - name: error_logs_1m
          source: loki
          query: 'sum(rate({k8s_namespace_name="$namespace",k8s_pod_name="$pod"} |~ "(?i)(error|panic|fatal)" [1m]))'
      service_bundle:
        - name: error_rate_1m
          query: 'sum(rate(spanmetrics_apm_calls_total{service_name="$service_name",status_code="STATUS_CODE_ERROR"}[1m]))'
        - name: request_rate_1m
          query: 'sum(rate(spanmetrics_apm_calls_total{service_name="$service_name"}[1m]))'
        - name: latency_p99_5m
          query: 'histogram_quantile(0.99, sum(rate(spanmetrics_apm_duration_milliseconds_bucket{service_name="$service_name"}[5m])) by (le))'

    links:
      grafana_base_url: {{ .Values.config.links.grafanaBaseUrl | default "" | quote }}
      tempo_base_url: {{ .Values.config.links.tempoBaseUrl | default "" | quote }}
      loki_base_url: {{ .Values.config.links.lokiBaseUrl | default "" | quote }}
      runbook_base_url: {{ .Values.config.links.runbookBaseUrl | default "" | quote }}
      grafana_vm_datasource_uid: {{ .Values.config.links.grafanaVmDatasourceUid | default "" | quote }}
      grafana_tempo_datasource_uid: {{ .Values.config.links.grafanaTempoDatasourceUid | default "" | quote }}
      grafana_loki_datasource_uid: {{ .Values.config.links.grafanaLokiDatasourceUid | default "" | quote }}
