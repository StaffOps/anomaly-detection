site_name: Anomaly Detection — StaffOps
site_description: Distributed anomaly detection for Kubernetes clusters
site_url: https://staffops.github.io/anomaly-detection/
repo_url: https://github.com/StaffOps/staffops-anomaly-detection
repo_name: StaffOps/anomaly-detection
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - toc.follow
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
      primary: deep purple
      accent: amber
    - scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
      primary: deep purple
      accent: amber

nav:
  - Home:
      - index.md
      - Roadmap: roadmap.md
  - Architecture:
      - architecture/index.md
      - Components: architecture/components.md
      - Data Flow: architecture/data-flow.md
      - Decisions: architecture/decisions.md
      - Degradation Model: architecture/degradation-model.md
      - Threat Model & Limitations: threat-model-and-limitations.md
      - Evaluation Scorecard: evaluation-scorecard.md
      - Product Hypothesis (gated): hypothesis-causal-origination.md
  - Detection:
      - detection/index.md
      - Static Thresholds: detection/static.md
      - Adaptive Z-Score: detection/adaptive.md
      - Log Patterns: detection/logs.md
      - ML Integration: detection/ml.md
      - Correlation: detection/correlation.md
  - Configuration:
      - configuration/index.md
      - Detection Rules: configuration/rules.md
      - Suppression: configuration/suppression.md
      - Enrichment: configuration/enrichment.md
  - Operations:
      - operations/index.md
      - Quick Start: operations/quickstart.md
      - Replay Mode: operations/replay.md
      - Monitoring: operations/monitoring.md
      - Troubleshooting: operations/troubleshooting.md
  - Development:
      - development/index.md
      - Building: development/building.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
  - Deploy:
      - Getting Started: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Reference:
      - Helm Values: reference/helm.md
      - Metrics: reference/metrics.md
      - Alert Rules: reference/alert-rules.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StaffOps
  generator: false

copyright: Copyright &copy; StaffOps Contributors — Apache 2.0

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
