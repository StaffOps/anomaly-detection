# All endpoint URLs, cluster names and other environment-specific values come
# from environment variables (12-factor: III. Config). The loader expands
# ${VAR} and ${VAR:default} placeholders BEFORE YAML parsing.
#
# See `.env.example` at the repo root for the full list of required vars.

cluster: ${CLUSTER_NAME:unknown}

redis:
  addr: ${REDIS_ADDR:redis:6379}
  db: ${REDIS_DB:0}
  password: ${REDIS_PASSWORD:}

datasources:
  victoriametrics:
    url: ${VM_URL}
    timeout: ${VM_TIMEOUT:30s}
  loki:
    url: ${LOKI_URL}
    timeout: ${LOKI_TIMEOUT:30s}
  alertmanager:
    url: ${ALERTMANAGER_URL}

ml:
  endpoint: ${ML_ENDPOINT:ml:50051}
  enabled: ${ML_ENABLED:true}
  timeout: ${ML_TIMEOUT:5s}

controller:
  job_interval: 60s
  correlation_window: 2m
  cooldown: 5m
  fdr_target: 0.05  # Benjamini-Hochberg FDR control (0.05 = 5% expected false discoveries)
  lease_name: anomaly-controller-leader
  lease_namespace: ${CONTROLLER_LEASE_NAMESPACE:monitoring}
  metrics_port: 8080
  worker_endpoint: ${WORKER_ENDPOINT:dns:///worker:50052}

  # K8s Lease-based leader election (HA). Required when running multiple
  # controller replicas in a cluster — only the leader runs detection cycles
  # to avoid duplicate alerts and split correlation state.
  #
  # When enabled=false (local dev / docker-compose), the controller acts as
  # if always leader.
  leader_election:
    enabled: ${LEADER_ELECTION_ENABLED:false}
    # identity defaults to POD_NAME env var (set via downward API) or hostname.
    # Override only for testing — must be unique per replica.
    identity: ${POD_NAME:}
    lease_duration: 15s    # how long a non-leader waits to take over
    renew_deadline: 10s    # must be < lease_duration
    retry_period: 2s       # candidate retry interval

worker:
  grpc_port: 50052
  metrics_port: 8081
  concurrency: 2

baseline:
  window_size: 60
  ewma_alpha: 0.3
  zscore_threshold: 3.0
  poison_threshold: 4.0  # Skip baseline update when z > this (anti-poisoning). 0 = disabled.
  warm_up_samples: 60
  seasonal_min_days: 7

detection:
  # --- STATIC RULES ---
  # Only truly critical thresholds that need immediate attention.
  # CPU/memory ratio removed — duplicates VMAlert, generates noise.
  static_rules:
    - name: high_restart_rate
      query: max(increase(kube_pod_container_status_restarts_total{namespace!~"${EXCLUDE_NAMESPACES_REGEX:kube-system}"}[5m])) by (namespace, pod)
      threshold: 3
      operator: ">"
      severity: critical

    - name: istio_5xx_rate_high
      query: sum(rate(istio_requests_total{response_code=~"5..",destination_workload!=""}[5m])) by (destination_workload, destination_workload_namespace) / sum(rate(istio_requests_total{destination_workload!=""}[5m])) by (destination_workload, destination_workload_namespace) > 0.05
      threshold: 0.05
      operator: ">"
      severity: warning

    - name: kestrel_queued_requests_high
      query: max(kestrel_queued_requests) by (namespace, pod)
      threshold: 50
      operator: ">"
      severity: warning

    - name: dotnet_threadpool_saturated
      query: max(dotnet_thread_pool_queue_length_total) by (namespace, pod) > 0 or max(process_runtime_dotnet_thread_pool_queue_length) by (namespace, pod) > 0
      threshold: 100
      operator: ">"
      severity: warning

    - name: http_client_queue_time_high
      query: histogram_quantile(0.99, sum(rate(http_client_request_time_in_queue_seconds_bucket[5m])) by (le, namespace, pod))
      threshold: 2.0
      operator: ">"
      severity: warning

    - name: otel_collector_dropping_spans
      query: sum(rate(otelcol_exporter_enqueue_failed_spans_total[5m])) by (service_name)
      threshold: 0
      operator: ">"
      severity: critical

    - name: rollout_stuck
      query: max(rollout_info_replicas_unavailable) by (namespace, rollout)
      threshold: 0
      operator: ">"
      severity: warning

  # --- ADAPTIVE RULES (Z-Score) ---
  # These learn baseline per series and alert on deviations.
  adaptive_metrics:
    # RED metrics from spanmetrics (30+ services)
    # Note: spanmetrics lack k8s namespace — only service_name available.
    # namespace shows as "unknown" in dashboards for these.
    - name: error_rate_by_service
      query: sum(rate(spanmetrics_apm_calls_total{status_code="STATUS_CODE_ERROR"}[1m])) by (service_name)
      group_by: [service_name]

    - name: request_rate_by_service
      query: sum(rate(spanmetrics_apm_calls_total[1m])) by (service_name)
      group_by: [service_name]

    - name: latency_p99_by_service
      query: histogram_quantile(0.99, sum(rate(spanmetrics_apm_duration_milliseconds_bucket[5m])) by (le, service_name))
      group_by: [service_name]

    # Istio mesh — service-to-service error rate
    - name: istio_error_rate_by_workload
      query: sum(rate(istio_requests_total{response_code=~"5..",destination_workload!=""}[1m])) by (destination_workload, destination_workload_namespace)
      group_by: [destination_workload, destination_workload_namespace]

    # .NET saturation signals (leading indicators)
    - name: dotnet_gc_pause_rate
      query: sum(rate(dotnet_gc_pause_time_seconds_total[1m])) by (namespace, pod)
      group_by: [namespace, pod]

    - name: dotnet_heap_growth
      query: max(process_runtime_dotnet_gc_heap_size_bytes) by (namespace, pod)
      group_by: [namespace, pod]

    - name: http_client_active_requests
      query: max(http_client_active_requests) by (namespace, pod)
      group_by: [namespace, pod]

    # Queue depth (SQS-backed and Kestrel)
    - name: queue_depth
      query: max(queue_depth_messages) by (namespace, pod)
      group_by: [namespace, pod]

    - name: queue_failed_rate
      query: sum(rate(queue_messages_failed_total[1m])) by (namespace, pod)
      group_by: [namespace, pod]

    # DB connection pool saturation
    - name: hikari_pool_pending
      query: max(hikaricp_connections_pending) by (namespace, pod)
      group_by: [namespace, pod]

    - name: go_sql_waiting
      query: max(go_sql_stats_connections_waited_for_total) by (namespace, pod)
      group_by: [namespace, pod]

    # OTel Collector pipeline health
    - name: otel_collector_queue_size
      query: max(otelcol_exporter_queue_size) by (service_name)
      group_by: [service_name]

    # Karpenter scheduling
    - name: karpenter_scheduling_duration
      query: histogram_quantile(0.99, sum(rate(karpenter_provisioner_scheduling_duration_seconds_bucket[5m])) by (le))
      group_by: []

  log_patterns:
    - name: error_rate_by_namespace
      query: sum(rate({service_namespace=~".+"} |= "error" [1m])) by (service_namespace)
      group_by: [service_namespace]
    - name: log_volume_by_workload
      query: sum(rate({service_namespace=~".+"}[1m])) by (service_namespace, service_workload)
      group_by: [service_namespace, service_workload]
    - name: panic_oom
      query: '{service_namespace=~".+"} |~ "(?i)(panic|oom|out of memory|fatal)"'
      type: pattern_match

  event_patterns:
    - CrashLoopBackOff
    - OOMKilled
    - Evicted
    - FailedScheduling
    - BackOff

# Suppression: namespaces ignored by detectors. Comma-separated env vars
# (parsed by config loader). Empty means "no suppression for that bucket".
suppression:
  exclude_namespaces_csv: ${EXCLUDE_NAMESPACES_CSV:kube-system}
  exclude_static_only_csv: ${EXCLUDE_STATIC_ONLY_CSV:}

enrichment:
  enabled: true
  cache_ttl: 30s
  query_timeout: 5s
  max_concurrent: 2

  pod_bundle:
    - name: cpu_ratio
      query: 'max(rate(container_cpu_usage_seconds_total{namespace="$namespace",pod="$pod",container!=""}[1m])) / max(kube_pod_container_resource_limits{resource="cpu",namespace="$namespace",pod="$pod"})'
    - name: memory_ratio
      query: 'max(container_memory_working_set_bytes{namespace="$namespace",pod="$pod",container!=""}) / max(kube_pod_container_resource_limits{resource="memory",namespace="$namespace",pod="$pod"})'
    - name: restarts_5m
      query: 'max(increase(kube_pod_container_status_restarts_total{namespace="$namespace",pod="$pod"}[5m]))'
    - name: oom_kills
      query: 'max(kube_pod_container_status_terminated_reason{namespace="$namespace",pod="$pod",reason="OOMKilled"})'
    - name: ready_replicas
      query: 'max(kube_pod_status_ready{namespace="$namespace",pod="$pod",condition="true"})'
    - name: error_logs_1m
      source: loki
      query: 'sum(rate({k8s_namespace_name="$namespace",k8s_pod_name="$pod"} |~ "(?i)(error|panic|fatal)" [1m]))'

  service_bundle:
    - name: error_rate_1m
      query: 'sum(rate(spanmetrics_apm_calls_total{service_name="$service_name",status_code="STATUS_CODE_ERROR"}[1m]))'
    - name: request_rate_1m
      query: 'sum(rate(spanmetrics_apm_calls_total{service_name="$service_name"}[1m]))'
    - name: latency_p99_5m
      query: 'histogram_quantile(0.99, sum(rate(spanmetrics_apm_duration_milliseconds_bucket{service_name="$service_name"}[5m])) by (le))'

# All link base URLs come from env vars. Empty value = annotation not emitted.
links:
  grafana_base_url: ${GRAFANA_BASE_URL:}
  tempo_base_url: ${TEMPO_BASE_URL:}
  loki_base_url: ${LOKI_BASE_URL:}
  runbook_base_url: ${RUNBOOK_BASE_URL:}
  grafana_vm_datasource_uid: ${GRAFANA_VM_DATASOURCE_UID:}
  grafana_tempo_datasource_uid: ${GRAFANA_TEMPO_DATASOURCE_UID:}
  grafana_loki_datasource_uid: ${GRAFANA_LOKI_DATASOURCE_UID:}
