# All endpoint URLs, cluster names and other environment-specific values come
# from environment variables (12-factor: III. Config). The loader expands
# ${VAR} and ${VAR:default} placeholders BEFORE YAML parsing.
#
# See `.env.example` at the repo root for the full list of required vars.
#
# SCOPE (Decision 10): this file is FOR LOCAL TESTING (docker-compose) and
# `--replay` ONLY. The DEPLOYED detection rules — what actually runs on the
# cluster — live in the per-cluster Helm override
# (k8s-setup/.../anomaly-detection/values.yaml.gotmpl, `detection:`). That gotmpl
# is the source of truth for the cluster; editing rules HERE affects local/replay
# only and does NOT reach the cluster. They diverge by design.
#
# ⚠️ If you are unsure WHICH file to edit for a rule change, ASK first — don't guess.

cluster: ${CLUSTER_NAME:unknown}

redis:
  addr: ${REDIS_ADDR:redis:6379}
  db: ${REDIS_DB:0}
  password: ${REDIS_PASSWORD:}

datasources:
  prometheus:
    url: ${PROMETHEUS_URL}
    timeout: ${PROMETHEUS_TIMEOUT:30s}
  loki:
    url: ${LOKI_URL}
    timeout: ${LOKI_TIMEOUT:30s}
  alertmanager:
    url: ${ALERTMANAGER_URL}

ml:
  endpoint: ${ML_ENDPOINT:ml:50051}
  enabled: ${ML_ENABLED:true}
  timeout: ${ML_TIMEOUT:5s}

controller:
  job_interval: 60s
  correlation_window: 2m
  cooldown: 5m
  fdr_target: 0.05  # Benjamini-Hochberg FDR control (0.05 = 5% expected false discoveries)
  lease_name: anomaly-controller-leader
  lease_namespace: ${CONTROLLER_LEASE_NAMESPACE:monitoring}
  metrics_port: 8080
  worker_endpoint: ${WORKER_ENDPOINT:dns:///worker:50052}

  # K8s Lease-based leader election (HA). Required when running multiple
  # controller replicas in a cluster — only the leader runs detection cycles
  # to avoid duplicate alerts and split correlation state.
  #
  # When enabled=false (local dev / docker-compose), the controller acts as
  # if always leader.
  leader_election:
    enabled: ${LEADER_ELECTION_ENABLED:false}
    # identity defaults to POD_NAME env var (set via downward API) or hostname.
    # Override only for testing — must be unique per replica.
    identity: ${POD_NAME:}
    lease_duration: 15s    # how long a non-leader waits to take over
    renew_deadline: 10s    # must be < lease_duration
    retry_period: 2s       # candidate retry interval

worker:
  grpc_port: 50052
  metrics_port: 8081
  concurrency: 2

baseline:
  window_size: 60
  ewma_alpha: 0.3
  zscore_threshold: 3.0
  poison_threshold: 4.0  # Skip baseline update when z > this (anti-poisoning). 0 = disabled.
  warm_up_samples: 60
  seasonal_min_days: 7

detection:
  # --- STATIC RULES ---
  # Only truly critical thresholds that need immediate attention.
  # CPU/memory ratio removed — duplicates VMAlert, generates noise.
  static_rules:
    - name: high_restart_rate
      query: max(increase(kube_pod_container_status_restarts_total{namespace!~"${EXCLUDE_NAMESPACES_REGEX:kube-system}"}[5m])) by (cluster, namespace, pod)
      threshold: 3
      operator: ">"
      severity: critical

    - name: istio_5xx_rate_high
      query: 'label_replace(sum(rate(istio_requests_total{response_code=~"5..",destination_workload!=""}[5m])) by (cluster, destination_workload, destination_workload_namespace) / sum(rate(istio_requests_total{destination_workload!=""}[5m])) by (cluster, destination_workload, destination_workload_namespace) > 0.05, "namespace", "$1", "destination_workload_namespace", "(.*)")'
      threshold: 0.05
      operator: ">"
      severity: warning

    # Dead rule fixed 2026-07-21: kestrel_queued_requests does not exist (0
    # series). Kestrel emits kestrel_queued_connections.
    - name: kestrel_queued_connections_high
      query: 'label_replace(label_replace(max(kestrel_queued_connections) by (eks_cluster, service_namespace, pod), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      threshold: 50
      operator: ">"
      severity: warning

    - name: dotnet_threadpool_saturated
      # dotnet_thread_pool_queue_length_total (the .NET 9+ native meter name)
      # is not emitted by any current workload — only the legacy
      # process_runtime_dotnet_* era exists in the inventory (verified
      # 2026-07-17). Re-add the `or` alternative when services move to .NET 9.
      query: 'label_replace(label_replace(max(process_runtime_dotnet_thread_pool_queue_length) by (eks_cluster, service_namespace, pod), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      threshold: 100
      operator: ">"
      severity: warning

    - name: http_client_queue_time_high
      query: 'label_replace(label_replace(histogram_quantile(0.99, sum(rate(http_client_request_time_in_queue_seconds_bucket[5m])) by (le, eks_cluster, service_namespace, pod)), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      threshold: 2.0
      operator: ">"
      severity: warning

    - name: otel_collector_dropping_spans
      # otelcol_exporter_* carries neither cluster nor namespace - only service_name.
      query: sum(rate(otelcol_exporter_enqueue_failed_spans_total[5m])) by (service_name)
      threshold: 0
      operator: ">"
      severity: critical

    - name: rollout_stuck
      # `namespace` here is where the argo-rollouts CONTROLLER runs; the rollout's
      # real namespace is exported_namespace, and its name is `name` (no `rollout`).
      query: 'label_replace(label_replace(max(rollout_info_replicas_unavailable) by (cluster, exported_namespace, name), "namespace", "$1", "exported_namespace", "(.*)"), "rollout", "$1", "name", "(.*)")'
      threshold: 0
      operator: ">"
      severity: warning

  # --- ADAPTIVE RULES (Z-Score) ---
  # These learn baseline per series and alert on deviations.
  adaptive_metrics:
    # RED metrics from spanmetrics (30+ services)
    # CORRECTED 2026-07-21: the old note here claimed "spanmetrics lack k8s
    # namespace — only service_name available". That is false: spanmetrics carry
    # service_namespace + eks_cluster (48553 of 49286 series). The stale
    # assumption is what made namespace show as "unknown" in the dashboards —
    # the `by (cluster, service_name)` clause was discarding a label that was
    # there all along. label_replace maps them to the canonical names the
    # controller reads.
    # rate() windows are [2m], not [1m]: the org scrape interval is 30s and
    # rate() needs ≥4× the scrape interval to survive a missed scrape.
    - name: error_rate_by_service
      query: 'label_replace(label_replace(sum(rate(spanmetrics_apm_calls_total{status_code="STATUS_CODE_ERROR"}[2m])) by (eks_cluster, service_namespace, service_name), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      group_by: [cluster, namespace, service_name]

    - name: request_rate_by_service
      query: 'label_replace(label_replace(sum(rate(spanmetrics_apm_calls_total[2m])) by (eks_cluster, service_namespace, service_name), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      group_by: [cluster, namespace, service_name]

    - name: latency_p99_by_service
      query: 'label_replace(label_replace(histogram_quantile(0.99, sum(rate(spanmetrics_apm_duration_milliseconds_bucket[5m])) by (le, eks_cluster, service_namespace, service_name)), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      group_by: [cluster, namespace, service_name]

    # Istio mesh — service-to-service error rate
    - name: istio_error_rate_by_workload
      query: 'label_replace(sum(rate(istio_requests_total{response_code=~"5..",destination_workload!=""}[2m])) by (cluster, destination_workload, destination_workload_namespace), "namespace", "$1", "destination_workload_namespace", "(.*)")'
      group_by: [cluster, namespace, destination_workload]

    # .NET saturation signals (leading indicators).
    # NOTE (hygiene 2026-07-17): dotnet_gc_pause_rate removed — its metric
    # (dotnet_gc_pause_time_seconds_total, .NET 9+ native meter) is absent from
    # the live inventory; the rule never fired. Re-add on .NET 9 migration.
    # REMOVED 2026-07-22: dotnet_heap_growth. It alerted on ABSOLUTE .NET heap
    # bytes — not comparable across services and not actionable: 23% of all fired
    # alerts over 6h, every one with an empty namespace, while the heap/limit
    # ratio across the whole fleet was q99=0.205, max=0.524 (nothing near memory
    # pressure). A heap/limit replacement was drafted, but every candidate floor
    # sat above the fleet maximum — the rule would ship permanently silent, which
    # is worse than no rule. Reintroduce with a threshold derived from actual
    # OOMKills. See the gotmpl for the query that resolves labels correctly.
    # label_replace: the metric carries eks_cluster/service_namespace, not
    # cluster/namespace — without the mapping every alert had an empty namespace.
    - name: http_client_active_requests
      query: 'label_replace(label_replace(max(http_client_active_requests) by (eks_cluster, service_namespace, pod), "namespace", "$1", "service_namespace", "(.*)"), "cluster", "$1", "eks_cluster", "(.*)")'
      group_by: [cluster, namespace, pod]
      min_value: 20

    # Queue depth rules (queue_depth_messages / queue_messages_failed_total)
    # removed 2026-07-17: no workload emits these custom metrics today (absent
    # from the live inventory — rules never fired). Restore when a queue-backed
    # service ships them.

    # DB connection pool saturation.
    # go_sql_waiting removed 2026-07-17: go_sql_stats_connections_waited_for_total
    # absent from the live inventory (no Go service exports database/sql stats).
    - name: hikari_pool_pending
      query: max(hikaricp_connections_pending) by (cluster, namespace, pod)
      group_by: [cluster, namespace, pod]

    # OTel Collector pipeline health
    - name: otel_collector_queue_size
      query: max(otelcol_exporter_queue_size) by (cluster, namespace, service_name)
      group_by: [cluster, namespace, service_name]

    # karpenter_scheduling_duration removed 2026-07-17: the
    # karpenter_provisioner_* metric family was renamed upstream (Karpenter
    # ≥v0.33 uses karpenter_nodeclaims_*/karpenter_pods_*) and is absent from
    # the inventory. Reintroduce against the new names via the P1.4 catalog.

  log_patterns:
    - name: error_rate_by_namespace
      # LogQL has no label_replace; label_format is the equivalent.
      query: 'sum(rate({service_namespace=~".+"} |= "error" | label_format namespace=service_namespace [2m])) by (cluster, namespace)'
      group_by: [cluster, namespace]
    - name: log_volume_by_workload
      query: 'sum(rate({service_namespace=~".+"} | label_format namespace=service_namespace [2m])) by (cluster, namespace, service_workload)'
      group_by: [cluster, namespace, service_workload]
    - name: panic_oom
      query: '{service_namespace=~".+"} |~ "(?i)(panic|oom|out of memory|fatal)"'
      type: pattern_match

  event_patterns:
    - CrashLoopBackOff
    - OOMKilled
    - Evicted
    - FailedScheduling
    - BackOff

# Suppression: namespaces ignored by detectors. Comma-separated env vars
# (parsed by config loader). Empty means "no suppression for that bucket".
suppression:
  exclude_namespaces_csv: ${EXCLUDE_NAMESPACES_CSV:kube-system}
  exclude_static_only_csv: ${EXCLUDE_STATIC_ONLY_CSV:}
  # Workloads whose adaptive (Z-Score) noise is silenced while static/log signals
  # still fire — for inherently bursty infra (brokers, collectors, service mesh).
  exclude_adaptive_workloads_csv: ${EXCLUDE_ADAPTIVE_WORKLOADS_CSV:}

enrichment:
  enabled: true
  cache_ttl: 30s
  query_timeout: 5s
  max_concurrent: 2

  pod_bundle:
    - name: cpu_ratio
      query: 'max(rate(container_cpu_usage_seconds_total{cluster="$cluster",namespace="$namespace",pod="$pod",container!=""}[1m])) / max(kube_pod_container_resource_limits{resource="cpu",cluster="$cluster",namespace="$namespace",pod="$pod"})'
    - name: memory_ratio
      query: 'max(container_memory_working_set_bytes{cluster="$cluster",namespace="$namespace",pod="$pod",container!=""}) / max(kube_pod_container_resource_limits{resource="memory",cluster="$cluster",namespace="$namespace",pod="$pod"})'
    - name: restarts_5m
      query: 'max(increase(kube_pod_container_status_restarts_total{cluster="$cluster",namespace="$namespace",pod="$pod"}[5m]))'
    - name: oom_kills
      query: 'max(kube_pod_container_status_terminated_reason{cluster="$cluster",namespace="$namespace",pod="$pod",reason="OOMKilled"})'
    - name: ready_replicas
      query: 'max(kube_pod_status_ready{cluster="$cluster",namespace="$namespace",pod="$pod",condition="true"})'
    - name: error_logs_1m
      source: loki
      query: 'sum(rate({cluster="$cluster",k8s_namespace_name="$namespace",k8s_pod_name="$pod"} |~ "(?i)(error|panic|fatal)" [1m]))'

  service_bundle:
    - name: error_rate_1m
      query: 'sum(rate(spanmetrics_apm_calls_total{cluster="$cluster",service_name="$service_name",status_code="STATUS_CODE_ERROR"}[1m]))'
    - name: request_rate_1m
      query: 'sum(rate(spanmetrics_apm_calls_total{cluster="$cluster",service_name="$service_name"}[1m]))'
    - name: latency_p99_5m
      query: 'histogram_quantile(0.99, sum(rate(spanmetrics_apm_duration_milliseconds_bucket{cluster="$cluster",service_name="$service_name"}[5m])) by (le))'

# All link base URLs come from env vars. Empty value = annotation not emitted.
links:
  grafana_base_url: ${GRAFANA_BASE_URL:}
  tempo_base_url: ${TEMPO_BASE_URL:}
  loki_base_url: ${LOKI_BASE_URL:}
  runbook_base_url: ${RUNBOOK_BASE_URL:}
  grafana_prometheus_datasource_uid: ${GRAFANA_PROMETHEUS_DATASOURCE_UID:}
  grafana_tempo_datasource_uid: ${GRAFANA_TEMPO_DATASOURCE_UID:}
  grafana_loki_datasource_uid: ${GRAFANA_LOKI_DATASOURCE_UID:}
