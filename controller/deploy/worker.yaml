apiVersion: v1
kind: ServiceAccount
metadata:
  name: anomaly-worker
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anomaly-worker
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anomaly-worker
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: anomaly-worker
roleRef:
  kind: Role
  name: anomaly-worker
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-worker
  namespace: monitoring
spec:
  clusterIP: None
  selector:
    app: anomaly-worker
  ports:
    - port: 50052
      name: grpc
    - port: 8081
      name: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-worker
  namespace: monitoring
  labels:
    app: anomaly-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: anomaly-worker
  template:
    metadata:
      labels:
        app: anomaly-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: anomaly-worker
      containers:
        - name: worker
          image: REPLACE_ME_REGISTRY/anomaly-worker:latest
          args: ["--config", "/config/config.yaml"]
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 8081
              name: metrics
          env:
            - name: CLUSTER_NAME
              value: "REPLACE_ME_CLUSTER_NAME"
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: anomaly-detection-config
