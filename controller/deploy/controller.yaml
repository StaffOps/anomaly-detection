apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    istio.io/dataplane-mode: ambient
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anomaly-controller
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anomaly-controller
  namespace: monitoring
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anomaly-controller
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: anomaly-controller
roleRef:
  kind: Role
  name: anomaly-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-controller
  namespace: monitoring
  labels:
    app: anomaly-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-controller
  template:
    metadata:
      labels:
        app: anomaly-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: anomaly-controller
      containers:
        - name: controller
          image: REPLACE_ME_REGISTRY/anomaly-controller:latest
          args: ["--config", "/config/config.yaml"]
          ports:
            - containerPort: 8080
              name: metrics
          env:
            - name: CLUSTER_NAME
              value: "REPLACE_ME_CLUSTER_NAME"
            # Downward API: POD_NAME is used as the leader-election identity
            # so each replica has a unique, stable identity tied to its pod.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Leader election is required when running multiple replicas (HA).
            - name: LEADER_ELECTION_ENABLED
              value: "true"
            - name: CONTROLLER_LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: anomaly-detection-config
