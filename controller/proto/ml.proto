syntax = "proto3";

package anomaly;

option go_package = "github.com/staffops/staffops-anomaly-detection/proto";

// MLDetector is the interface for the Python ML service.
service MLDetector {
  rpc Forecast(ForecastRequest) returns (ForecastResponse);
  rpc DetectMultivariate(MultivariateRequest) returns (MultivariateResponse);
  rpc Health(Empty) returns (HealthResponse);
}

message ForecastRequest {
  string metric_name = 1;
  repeated double values = 2;
  repeated int64 timestamps = 3;
  int64 horizon_minutes = 4;
  double breach_threshold = 5;    // value that constitutes a breach
}

message ForecastResponse {
  repeated double predicted = 1;
  repeated double upper_bound = 2;
  repeated double lower_bound = 3;
  bool will_breach_threshold = 4;
  double time_to_breach_hours = 5;
  double confidence = 6;
}

message MultivariateRequest {
  repeated MetricSample samples = 1;
}

message MetricSample {
  string name = 1;
  double value = 2;
}

message MultivariateResponse {
  bool is_anomaly = 1;
  double anomaly_score = 2;
  repeated string contributing_metrics = 3;
}

message Empty {}

message HealthResponse {
  bool ready = 1;
  string model_version = 2;
}
